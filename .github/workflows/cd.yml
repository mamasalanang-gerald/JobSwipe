name: 🚀 CD Pipeline

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

env:
  DOCKER_HUB_REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKER_HUB_USERNAME }}/jobapp-backend

jobs:
  # ==========================================
  # PHASE 1: BUILD & PUSH TO DOCKER HUB
  # ==========================================
  build-and-push:
    name: 🏗️ Phase 1 - Build & Push to Docker Hub
    runs-on: ubuntu-latest
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tags: ${{ steps.meta.outputs.tags }}
    
    steps:
      - name: 🔍 Checkout Code
        uses: actions/checkout@v4

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: 📝 Extract Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=production,enable={{is_default_branch}}

      - name: 🏗️ Build and Push Docker Image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: ✅ Phase 1 Complete
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ PHASE 1 COMPLETE: Build & Push to Docker Hub"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📦 Image: ${{ env.IMAGE_NAME }}"
          echo "🏷️  Tags: latest, production, $(echo ${{ github.sha }} | cut -c1-7)"
          echo "🔍 Digest: ${{ steps.build.outputs.digest }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

  # ==========================================
  # PHASE 2: RENDER PULLS & DEPLOYS
  # ==========================================
  # PHASE 2: RENDER DEPLOYMENT (PULL & RUN)
  # ==========================================
  deploy-to-render:
    name: 🚀 Phase 2 - Deploy to Render
    runs-on: ubuntu-latest
    needs: build-and-push
    
    steps:
      - name: 🚀 Trigger Render Deployment
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "� PHASE 2: $Triggering Render Deployment"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "📦 Image: ${{ env.IMAGE_NAME }}:latest"
          echo "🔍 Digest: ${{ needs.build-and-push.outputs.image-digest }}"
          echo ""
          
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "⚠️  WARNING: RENDER_DEPLOY_HOOK_URL not configured"
            echo ""
            echo "📋 To enable automatic deployment:"
            echo "   1. Go to Render Dashboard → jobapp-backend → Settings"
            echo "   2. Scroll to 'Deploy Hook' section"
            echo "   3. Copy the Deploy Hook URL"
            echo "   4. Add it as RENDER_DEPLOY_HOOK_URL secret in GitHub:"
            echo "      GitHub Repo → Settings → Secrets → Actions → New secret"
            echo ""
            echo "🔧 For now, manual deployment required:"
            echo "   • Go to Render Dashboard"
            echo "   • Select jobapp-backend service"
            echo "   • Click 'Manual Deploy' → 'Deploy latest commit'"
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            exit 0
          fi
          
          echo "🔗 Calling Render Deploy Hook..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$RENDER_DEPLOY_HOOK_URL")
          
          if [ "$RESPONSE" -eq 200 ] || [ "$RESPONSE" -eq 201 ]; then
            echo "✅ Render deployment triggered successfully!"
            echo ""
            echo "🚀 Render Configuration:"
            echo "   • Service: jobapp-backend"
            echo "   • Image: docker.io/gm1026/jobapp-backend:latest"
            echo "   • Region: Oregon (us-west)"
            echo "   • Health Check: /api/health"
            echo ""
            echo "⏳ Render is pulling the image and deploying..."
            echo "🌐 Check Render dashboard for live status"
          else
            echo "❌ Failed to trigger Render deployment (HTTP $RESPONSE)"
            echo ""
            echo "🔧 Troubleshooting:"
            echo "   • Verify RENDER_DEPLOY_HOOK_URL is correct"
            echo "   • Check Render service status"
            echo "   • Try manual deployment from Render dashboard"
            exit 1
          fi
          
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🌐 Check Render dashboard for live status"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

  # ==========================================
  # PHASE 3: DEPLOYMENT SUMMARY
  # ==========================================
  deployment-summary:
    name: 📊 Phase 3 - Deployment Summary
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy-to-render]
    if: always()
    
    steps:
      - name: 📊 Generate Deployment Summary
        run: |
          echo "# 🚀 CD Pipeline Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Phase Status Table
          echo "## 📋 Deployment Phases" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Phase | Status | Description |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|-------------|" >> $GITHUB_STEP_SUMMARY
          echo "| 1️⃣ Build & Push | ${{ needs.build-and-push.result == 'success' && '✅ Success' || '❌ Failed' }} | Docker image built and pushed to Docker Hub |" >> $GITHUB_STEP_SUMMARY
          echo "| 2️⃣ Render Deploy | ${{ needs.deploy-to-render.result == 'success' && '✅ Success' || '❌ Failed' }} | Render pulls image from Docker Hub and deploys |" >> $GITHUB_STEP_SUMMARY
          echo "| 3️⃣ Summary | ✅ Complete | Deployment summary and infrastructure details |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Success or Failure Details
          if [[ "${{ needs.build-and-push.result }}" == "success" && "${{ needs.deploy-to-render.result }}" == "success" ]]; then
            echo "## ✅ Deployment SUCCESSFUL" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "🎉 **JobApp is now live in production!**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            # Docker Image Details
            echo "### 📦 Docker Image Details" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Registry | Docker Hub |" >> $GITHUB_STEP_SUMMARY
            echo "| Image | \`${{ env.IMAGE_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
            echo "| Tags | \`latest\`, \`production\`, \`$(echo ${{ github.sha }} | cut -c1-7)\` |" >> $GITHUB_STEP_SUMMARY
            echo "| Digest | \`${{ needs.build-and-push.outputs.image-digest }}\` |" >> $GITHUB_STEP_SUMMARY
            echo "| Platform | linux/amd64 |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            # Docker Compose Stack
            echo "### 🐳 Docker Compose Stack" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "#### Backend Service" >> $GITHUB_STEP_SUMMARY
            echo "- **Service**: Laravel Backend API" >> $GITHUB_STEP_SUMMARY
            echo "- **Image**: \`docker.io/gm1026/jobapp-backend:latest\`" >> $GITHUB_STEP_SUMMARY
            echo "- **Platform**: Render Web Service" >> $GITHUB_STEP_SUMMARY
            echo "- **Port**: 8080" >> $GITHUB_STEP_SUMMARY
            echo "- **Health Check**: \`/api/health\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            echo "#### Database Services (3 Databases)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**1. PostgreSQL** (Relational Database)" >> $GITHUB_STEP_SUMMARY
            echo "- Image: \`postgres:15-alpine\`" >> $GITHUB_STEP_SUMMARY
            echo "- Purpose: Primary relational data (users, jobs, applications)" >> $GITHUB_STEP_SUMMARY
            echo "- Render Service: \`jobapp-postgres\`" >> $GITHUB_STEP_SUMMARY
            echo "- Port: 5432" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            echo "**2. MongoDB** (NoSQL Database)" >> $GITHUB_STEP_SUMMARY
            echo "- Image: \`mongo:7\`" >> $GITHUB_STEP_SUMMARY
            echo "- Purpose: Document storage (profiles, swipe history)" >> $GITHUB_STEP_SUMMARY
            echo "- Deployment: External (MongoDB Atlas recommended)" >> $GITHUB_STEP_SUMMARY
            echo "- Port: 27017" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            echo "**3. Redis** (Cache & Session Store)" >> $GITHUB_STEP_SUMMARY
            echo "- Image: \`redis:7-alpine\`" >> $GITHUB_STEP_SUMMARY
            echo "- Purpose: Caching, sessions, queue management" >> $GITHUB_STEP_SUMMARY
            echo "- Render Service: \`jobapp-redis\`" >> $GITHUB_STEP_SUMMARY
            echo "- Port: 6379" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            # Service Information
            echo "### 🌐 Service Information" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- **Render Dashboard**: [View Deployment Status](https://dashboard.render.com)" >> $GITHUB_STEP_SUMMARY
            echo "- **Auto-Deploy**: Enabled (pulls from Docker Hub automatically)" >> $GITHUB_STEP_SUMMARY
            echo "- **Region**: Oregon (us-west)" >> $GITHUB_STEP_SUMMARY
            echo "- **Environment**: Production" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            # Security Features
            echo "### 🔒 Security Features" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ Docker image built with layer caching" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ Deployed from Docker Hub registry" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ HTTPS/TLS encryption enabled" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ Environment variables secured via Render" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ Database connections encrypted" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ Health checks configured" >> $GITHUB_STEP_SUMMARY
            
          else
            echo "## ❌ Deployment FAILED" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "The deployment pipeline encountered errors:" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            if [[ "${{ needs.build-and-push.result }}" != "success" ]]; then
              echo "### ❌ Phase 1: Build & Push Failed" >> $GITHUB_STEP_SUMMARY
              echo "- Failed to build or push Docker image to Docker Hub" >> $GITHUB_STEP_SUMMARY
              echo "- Check Docker Hub credentials (DOCKER_HUB_USERNAME, DOCKER_HUB_TOKEN)" >> $GITHUB_STEP_SUMMARY
              echo "- Verify Dockerfile syntax and build context" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
            fi
            
            if [[ "${{ needs.deploy-to-render.result }}" != "success" ]]; then
              echo "### ❌ Phase 2: Render Deploy Failed" >> $GITHUB_STEP_SUMMARY
              echo "- Render deployment notification failed" >> $GITHUB_STEP_SUMMARY
              echo "- Verify Render service configuration (render.yaml)" >> $GITHUB_STEP_SUMMARY
              echo "- Check Render dashboard for service status" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
            fi
            
            echo "### 🔧 Next Steps" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "1. Review the failed job logs above" >> $GITHUB_STEP_SUMMARY
            echo "2. Fix identified issues" >> $GITHUB_STEP_SUMMARY
            echo "3. Push fixes to trigger a new deployment" >> $GITHUB_STEP_SUMMARY
            echo "4. Monitor the new deployment in GitHub Actions" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Deployment Metadata
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Deployment Time**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "**Commit SHA**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered By**: @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch**: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY

      - name: 🎉 Deployment Success
        if: needs.build-and-push.result == 'success' && needs.deploy-to-render.result == 'success'
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ PHASE 3 COMPLETE: Deployment Summary"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "🎉 DEPLOYMENT SUCCESSFUL!"
          echo ""
          echo "✅ Phase 1: Docker image built and pushed to Docker Hub"
          echo "✅ Phase 2: Render pulling and deploying from Docker Hub"
          echo "✅ Phase 3: Deployment summary generated"
          echo ""
          echo "📦 Docker Compose Stack:"
          echo "   • Backend: Laravel API (docker.io/gm1026/jobapp-backend:latest)"
          echo "   • Database 1: PostgreSQL 15 (Render managed)"
          echo "   • Database 2: MongoDB 7 (External/Atlas)"
          echo "   • Database 3: Redis 7 (Render managed)"
          echo ""
          echo "🌐 Check Render dashboard for live deployment status"
          echo "📊 Health Check: /api/health"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: ❌ Deployment Failure
        if: needs.build-and-push.result != 'success' || needs.deploy-to-render.result != 'success'
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "❌ DEPLOYMENT FAILED"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          if [[ "${{ needs.build-and-push.result }}" != "success" ]]; then
            echo "❌ Phase 1 Failed: Docker build/push to Docker Hub"
          fi
          if [[ "${{ needs.deploy-to-render.result }}" != "success" ]]; then
            echo "❌ Phase 2 Failed: Render deployment"
          fi
          echo ""
          echo "Please review the logs above and fix the issues"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          exit 1
