name: 🚀 CD Pipeline - AWS EC2

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

env:
  DOCKER_HUB_REGISTRY: docker.io
  BACKEND_IMAGE: gm1026/jobapp-backend
  FRONTEND_IMAGE: gm1026/jobapp-web

jobs:
  # ==========================================
  # PHASE 1: BUILD & PUSH TO DOCKER HUB
  # ==========================================
  build-and-push:
    name: 🏗️ Phase 1 - Build & Push Images
    runs-on: ubuntu-latest
    outputs:
      backend-digest: ${{ steps.build-backend.outputs.digest }}
      frontend-digest: ${{ steps.build-frontend.outputs.digest }}
      commit-sha: ${{ github.sha }}
    
    steps:
      - name: 🔍 Checkout Code
        uses: actions/checkout@v4

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: 📝 Extract Backend Metadata
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=production,enable={{is_default_branch}}

      - name: 🏗️ Build and Push Backend Image
        id: build-backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
          platforms: linux/amd64

      - name: 📝 Extract Frontend Metadata
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=production,enable={{is_default_branch}}

      - name: 🏗️ Build and Push Frontend Image
        id: build-frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend/web
          file: ./frontend/web/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          platforms: linux/amd64

      - name: ✅ Phase 1 Complete
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ PHASE 1 COMPLETE: Build & Push to Docker Hub"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📦 Backend: ${{ env.BACKEND_IMAGE }}:latest"
          echo "🔍 Digest: ${{ steps.build-backend.outputs.digest }}"
          echo ""
          echo "📦 Frontend: ${{ env.FRONTEND_IMAGE }}:latest"
          echo "🔍 Digest: ${{ steps.build-frontend.outputs.digest }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

  # ==========================================
  # PHASE 2: DEPLOY TO AWS EC2
  # ==========================================
  deploy-to-ec2:
    name: 🚀 Phase 2 - Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    
    steps:
      - name: 🔐 Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AWS_EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.AWS_EC2_HOST }} >> ~/.ssh/known_hosts

      - name: 🚀 Deploy to EC2
        env:
          BACKEND_IMAGE: ${{ env.BACKEND_IMAGE }}
          FRONTEND_IMAGE: ${{ env.FRONTEND_IMAGE }}
        run: |
          ssh ${{ secrets.AWS_EC2_USER }}@${{ secrets.AWS_EC2_HOST }} << 'EOF'
            set -e
            cd ~/jobapp
            
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "🚀 PHASE 2: Deploying to AWS EC2"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            
            # Pull latest images
            echo "📥 Pulling latest Docker images..."
            docker pull gm1026/jobapp-backend:latest
            docker pull gm1026/jobapp-web:latest
            
            # Rolling update - Backend
            echo "🔄 Updating backend (zero downtime)..."
            docker-compose -f docker-compose.prod.yml up -d --no-deps backend
            sleep 10
            
            # Rolling update - Horizon
            echo "🔄 Updating Horizon worker..."
            docker-compose -f docker-compose.prod.yml up -d --no-deps horizon
            sleep 5
            
            # Rolling update - Frontend
            echo "🔄 Updating frontend..."
            docker-compose -f docker-compose.prod.yml up -d --no-deps frontend
            sleep 5
            
            # Cleanup old images
            echo "🧹 Cleaning up old Docker images..."
            docker image prune -af --filter "until=24h"
            
            # Show status
            echo ""
            echo "📊 Container Status:"
            docker-compose -f docker-compose.prod.yml ps
            
            echo ""
            echo "✅ Deployment complete!"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          EOF

      - name: 🧹 Cleanup SSH Key
        if: always()
        run: rm -f ~/.ssh/id_rsa

  # ==========================================
  # PHASE 3: DEPLOYMENT SUMMARY
  # ==========================================
  deployment-summary:
    name: 📊 Phase 3 - Deployment Summary
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy-to-ec2]
    if: always()
    
    steps:
      - name: 📊 Generate Summary
        run: |
          echo "# 🚀 CD Pipeline Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📋 Deployment Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Status | Image |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | ${{ needs.deploy-to-ec2.result == 'success' && '✅ Deployed' || '❌ Failed' }} | \`${{ env.BACKEND_IMAGE }}:latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | ${{ needs.deploy-to-ec2.result == 'success' && '✅ Deployed' || '❌ Failed' }} | \`${{ env.FRONTEND_IMAGE }}:latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🐳 Infrastructure" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Platform**: AWS EC2 (13.213.13.180)" >> $GITHUB_STEP_SUMMARY
          echo "- **Domain**: jobswipe.site" >> $GITHUB_STEP_SUMMARY
          echo "- **Backend**: Laravel API + Nginx" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend**: Next.js Web App" >> $GITHUB_STEP_SUMMARY
          echo "- **Database 1**: PostgreSQL (Docker)" >> $GITHUB_STEP_SUMMARY
          echo "- **Database 2**: MongoDB (Docker)" >> $GITHUB_STEP_SUMMARY
          echo "- **Database 3**: Redis (Docker)" >> $GITHUB_STEP_SUMMARY
          echo "- **Worker**: Laravel Horizon" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🔗 Commit" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **SHA**: \`${{ needs.build-and-push.outputs.commit-sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Message**: ${{ github.event.head_commit.message }}" >> $GITHUB_STEP_SUMMARY

      - name: ✅ Pipeline Complete
        if: needs.build-and-push.result == 'success' && needs.deploy-to-ec2.result == 'success'
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🎉 DEPLOYMENT SUCCESSFUL!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ Backend and Frontend deployed to AWS EC2"
          echo "🌐 Application is live at https://jobswipe.site"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: ❌ Pipeline Failed
        if: needs.build-and-push.result != 'success' || needs.deploy-to-ec2.result != 'success'
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "❌ DEPLOYMENT FAILED"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Check the logs above for details"
          exit 1
