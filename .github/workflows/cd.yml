name: 🚀 CD Pipeline

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

env:
  DOCKER_HUB_REGISTRY: docker.io
  BACKEND_IMAGE: ${{ secrets.DOCKER_HUB_USERNAME }}/jobapp-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKER_HUB_USERNAME }}/jobapp-web

jobs:
  # ==========================================
  # PHASE 1: BUILD & PUSH TO DOCKER HUB
  # ==========================================
  build-and-push:
    name: 🏗️ Phase 1 - Build & Push to Docker Hub
    runs-on: ubuntu-latest
    outputs:
      backend-digest: ${{ steps.build-backend.outputs.digest }}
      frontend-digest: ${{ steps.build-frontend.outputs.digest }}
    
    steps:
      - name: 🔍 Checkout Code
        uses: actions/checkout@v4

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: 📝 Extract Backend Metadata
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=production,enable={{is_default_branch}}

      - name: 🏗️ Build and Push Backend Image
        id: build-backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
          platforms: linux/amd64

      - name: 📝 Extract Frontend Metadata
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=production,enable={{is_default_branch}}

      - name: 🏗️ Build and Push Frontend Image
        id: build-frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend/web
          file: ./frontend/web/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          platforms: linux/amd64

      - name: ✅ Phase 1 Complete
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ PHASE 1 COMPLETE: Build & Push to Docker Hub"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📦 Backend: ${{ env.BACKEND_IMAGE }}:latest"
          echo "🔍 Digest: ${{ steps.build-backend.outputs.digest }}"
          echo ""
          echo "📦 Frontend: ${{ env.FRONTEND_IMAGE }}:latest"
          echo "🔍 Digest: ${{ steps.build-frontend.outputs.digest }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

  # ==========================================
  # PHASE 2: RENDER DEPLOYMENT (PULL & RUN)
  # ==========================================
  deploy-to-render:
    name: 🚀 Phase 2 - Deploy to Render
    runs-on: ubuntu-latest
    needs: build-and-push
    
    steps:
      - name: 🚀 Trigger Backend Deployment
        env:
          RENDER_BACKEND_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🚀 PHASE 2: Triggering Render Deployments"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "📦 Backend: ${{ env.BACKEND_IMAGE }}:latest"
          echo ""
          
          if [ -z "$RENDER_BACKEND_DEPLOY_HOOK" ]; then
            echo "⚠️  Backend deploy hook not configured - manual deployment required"
          else
            echo "🔗 Triggering backend deployment..."
            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$RENDER_BACKEND_DEPLOY_HOOK")
            
            if [ "$RESPONSE" -eq 200 ] || [ "$RESPONSE" -eq 201 ]; then
              echo "✅ Backend deployment triggered!"
            else
              echo "❌ Backend deployment failed (HTTP $RESPONSE)"
              exit 1
            fi
          fi

      - name: 🚀 Trigger Frontend Deployment
        env:
          RENDER_FRONTEND_DEPLOY_HOOK: ${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK_URL }}
        run: |
          echo ""
          echo "📦 Frontend: ${{ env.FRONTEND_IMAGE }}:latest"
          echo ""
          
          if [ -z "$RENDER_FRONTEND_DEPLOY_HOOK" ]; then
            echo "⚠️  Frontend deploy hook not configured - manual deployment required"
          else
            echo "🔗 Triggering frontend deployment..."
            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$RENDER_FRONTEND_DEPLOY_HOOK")
            
            if [ "$RESPONSE" -eq 200 ] || [ "$RESPONSE" -eq 201 ]; then
              echo "✅ Frontend deployment triggered!"
            else
              echo "❌ Frontend deployment failed (HTTP $RESPONSE)"
              exit 1
            fi
          fi
          
          echo ""
          echo "⏳ Render is pulling images and deploying..."
          echo "🌐 Check Render dashboard for status"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

  # ==========================================
  # PHASE 3: DEPLOYMENT SUMMARY
  # ==========================================
  deployment-summary:
    name: 📊 Phase 3 - Deployment Summary
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy-to-render]
    if: always()
    
    steps:
      - name: 📊 Generate Summary
        run: |
          echo "# 🚀 CD Pipeline Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📋 Deployment Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Status | Image |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | ${{ needs.build-and-push.result == 'success' && '✅ Deployed' || '❌ Failed' }} | \`${{ env.BACKEND_IMAGE }}:latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | ${{ needs.build-and-push.result == 'success' && '✅ Deployed' || '❌ Failed' }} | \`${{ env.FRONTEND_IMAGE }}:latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🐳 Infrastructure" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Backend**: Laravel API + Nginx" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend**: Next.js Web App" >> $GITHUB_STEP_SUMMARY
          echo "- **Database 1**: PostgreSQL (Render)" >> $GITHUB_STEP_SUMMARY
          echo "- **Database 2**: MongoDB (Atlas)" >> $GITHUB_STEP_SUMMARY
          echo "- **Database 3**: Redis (Render)" >> $GITHUB_STEP_SUMMARY

      - name: ✅ Pipeline Complete
        if: needs.build-and-push.result == 'success' && needs.deploy-to-render.result == 'success'
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🎉 DEPLOYMENT SUCCESSFUL!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ Backend and Frontend deployed to Render"
          echo "🌐 Check Render dashboard for live URLs"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: ❌ Pipeline Failed
        if: needs.build-and-push.result != 'success' || needs.deploy-to-render.result != 'success'
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "❌ DEPLOYMENT FAILED"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          exit 1
