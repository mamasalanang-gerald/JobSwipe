name: 🚀 CD Pipeline
# Docker Hub deployment - builds and pushes to gm1026/jobapp-backend

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

env:
  DOCKER_HUB_REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKER_HUB_USERNAME }}/jobapp-backend

jobs:
  # ==========================================
  # PHASE 1: BUILD & PUSH PRODUCTION IMAGES
  # ==========================================
  build-and-push:
    name: 🏗️ Phase 1 - Build & Push Production Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tag: ${{ steps.meta.outputs.tags }}
    
    steps:
      - name: 🔍 Checkout Code
        uses: actions/checkout@v4

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: 📝 Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=production,enable={{is_default_branch}}

      - name: 🏗️ Build and Push Docker Image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: ✅ Phase 1 Complete
        run: |
          echo "✅ Phase 1 - Build & Push completed successfully"
          echo "📦 Image: ${{ steps.meta.outputs.tags }}"
          echo "🔍 Digest: ${{ steps.build.outputs.digest }}"

  # ==========================================
  # PHASE 2: RENDER DEPLOYMENT (PULL & RUN)
  # ==========================================
  deploy-to-render:
    name: 🚀 Phase 2 - Deploy to Render
    runs-on: ubuntu-latest
    needs: build-and-push
    
    steps:
      - name: ✅ Image Published to Docker Hub
        run: |
          echo "✅ Docker image pushed to Docker Hub successfully!"
          echo "📦 Image: ${{ env.IMAGE_NAME }}:latest"
          echo "🔍 Digest: ${{ needs.build-and-push.outputs.image-digest }}"
          echo ""
          echo "🚀 Render will automatically pull and deploy the new image"
          echo "📋 Render Configuration:"
          echo "   - Service: jobapp-backend"
          echo "   - Image Source: Docker Hub"
          echo "   - Registry: docker.io/gm1026/jobapp-backend:latest"
          echo "   - Auto-Deploy: Enabled"
          echo ""
          echo "⏳ Deployment in progress..."
          echo "🌐 Check your Render dashboard for live deployment status"

  # ==========================================
  # PHASE 3: DEPLOYMENT SUMMARY
  # ==========================================
  deployment-summary:
    name: 📊 Phase 3 - Deployment Summary
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy-to-render]
    if: always()
    
    steps:
      - name: 📊 Generate Deployment Summary
        run: |
          echo "# 🚀 CD Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📋 Deployment Phases" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Phase | Status | Description |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|-------------|" >> $GITHUB_STEP_SUMMARY
          echo "| 1️⃣ Build & Push | ${{ needs.build-and-push.result == 'success' && '✅ Passed' || '❌ Failed' }} | Docker image built and pushed to Docker Hub |" >> $GITHUB_STEP_SUMMARY
          echo "| 2️⃣ Deploy to Render | ${{ needs.deploy-to-render.result == 'success' && '✅ Passed' || '❌ Failed' }} | Render pulls image from Docker Hub and deploys |" >> $GITHUB_STEP_SUMMARY
          echo "| 3️⃣ Summary | ✅ Complete | Deployment summary and infrastructure details |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [[ "${{ needs.build-and-push.result }}" == "success" && "${{ needs.deploy-to-render.result }}" == "success" ]]; then
            echo "## ✅ **Deployment SUCCESSFUL**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "🎉 **JobApp is now live in production!**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 📦 Production Image Details" >> $GITHUB_STEP_SUMMARY
            echo "- **Registry**: Docker Hub" >> $GITHUB_STEP_SUMMARY
            echo "- **Image**: ${{ env.IMAGE_NAME }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Tag**: latest, production, $(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_STEP_SUMMARY
            echo "- **Digest**: ${{ needs.build-and-push.outputs.image-digest }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 🐳 Docker Compose Stack" >> $GITHUB_STEP_SUMMARY
            echo "The production deployment includes the following services:" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "#### Backend Service" >> $GITHUB_STEP_SUMMARY
            echo "- **Service**: Laravel Backend API" >> $GITHUB_STEP_SUMMARY
            echo "- **Image**: docker.io/gm1026/jobapp-backend:latest" >> $GITHUB_STEP_SUMMARY
            echo "- **Platform**: Render Web Service" >> $GITHUB_STEP_SUMMARY
            echo "- **Port**: 8080" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "#### Database Services (3 Databases)" >> $GITHUB_STEP_SUMMARY
            echo "1. **PostgreSQL** (Relational Database)" >> $GITHUB_STEP_SUMMARY
            echo "   - Image: postgres:15-alpine" >> $GITHUB_STEP_SUMMARY
            echo "   - Purpose: Primary relational data (users, jobs, applications)" >> $GITHUB_STEP_SUMMARY
            echo "   - Render Service: jobapp-postgres" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "2. **MongoDB** (NoSQL Database)" >> $GITHUB_STEP_SUMMARY
            echo "   - Image: mongo:7" >> $GITHUB_STEP_SUMMARY
            echo "   - Purpose: Document storage (profiles, swipe history)" >> $GITHUB_STEP_SUMMARY
            echo "   - Note: Managed externally (MongoDB Atlas recommended)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "3. **Redis** (Cache & Session Store)" >> $GITHUB_STEP_SUMMARY
            echo "   - Image: redis:7-alpine" >> $GITHUB_STEP_SUMMARY
            echo "   - Purpose: Caching, sessions, queue management" >> $GITHUB_STEP_SUMMARY
            echo "   - Render Service: jobapp-redis" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 🌐 Service Information" >> $GITHUB_STEP_SUMMARY
            echo "- **Render Dashboard**: Check your Render service for deployment status" >> $GITHUB_STEP_SUMMARY
            echo "- **Auto-Deploy**: Render automatically pulls and deploys new images from Docker Hub" >> $GITHUB_STEP_SUMMARY
            echo "- **Health Check**: /api/health endpoint monitored" >> $GITHUB_STEP_SUMMARY
            echo "- **Region**: Oregon (us-west)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 🔒 Security Features" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ Docker image built with layer caching" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ Deployed from Docker Hub registry" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ HTTPS/TLS encryption enabled" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ Environment variables secured via Render" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ Database connections encrypted" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ **Deployment FAILED**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "The deployment pipeline encountered errors. Please review the failed jobs:" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            if [[ "${{ needs.build-and-push.result }}" != "success" ]]; then
              echo "- ❌ **Build & Push**: Failed to build or push production image to Docker Hub" >> $GITHUB_STEP_SUMMARY
            fi
            if [[ "${{ needs.deploy-to-render.result }}" != "success" ]]; then
              echo "- ❌ **Deploy to Render**: Failed to notify Render or deployment error" >> $GITHUB_STEP_SUMMARY
            fi
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 🔧 Next Steps" >> $GITHUB_STEP_SUMMARY
            echo "1. Review the failed job logs above" >> $GITHUB_STEP_SUMMARY
            echo "2. Check Docker Hub credentials (DOCKER_HUB_USERNAME, DOCKER_HUB_TOKEN)" >> $GITHUB_STEP_SUMMARY
            echo "3. Verify Render service configuration (render.yaml)" >> $GITHUB_STEP_SUMMARY
            echo "4. Fix any identified issues" >> $GITHUB_STEP_SUMMARY
            echo "5. Push fixes to trigger a new deployment" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "**Deployment Time**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY

      - name: 🎉 Deployment Success
        if: needs.build-and-push.result == 'success' && needs.deploy-to-render.result == 'success'
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🎉 DEPLOYMENT SUCCESSFUL!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "✅ Phase 1: Docker image built and pushed to Docker Hub"
          echo "✅ Phase 2: Render pulling and deploying from Docker Hub"
          echo "✅ Phase 3: Deployment summary generated"
          echo ""
          echo "📦 Docker Compose Stack Deployed:"
          echo "   • Backend: Laravel API (docker.io/gm1026/jobapp-backend:latest)"
          echo "   • Database 1: PostgreSQL 15 (Render managed)"
          echo "   • Database 2: MongoDB 7 (External/Atlas)"
          echo "   • Database 3: Redis 7 (Render managed)"
          echo ""
          echo "🌐 Production URL: Check Render dashboard"
          echo "📊 Health Check: /api/health"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: ❌ Deployment Failure Notification
        if: needs.build-and-push.result != 'success' || needs.deploy-to-render.result != 'success'
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "❌ DEPLOYMENT FAILED!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "Please review the failed jobs and fix the issues:"
          if [[ "${{ needs.build-and-push.result }}" != "success" ]]; then
            echo "  ❌ Phase 1 Failed: Docker build/push to Docker Hub"
          fi
          if [[ "${{ needs.deploy-to-render.result }}" != "success" ]]; then
            echo "  ❌ Phase 2 Failed: Render deployment"
          fi
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          exit 1

      - name: ✅ CD Pipeline Complete
        run: echo "✅ CD Pipeline completed"
