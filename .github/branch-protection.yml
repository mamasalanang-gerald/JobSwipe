# Branch Protection Configuration
# This file documents the required branch protection rules
# Apply these settings in GitHub repository settings

main:
  protection_rules:
    # Require pull request reviews
    required_pull_request_reviews:
      required_approving_review_count: 2
      dismiss_stale_reviews: true
      require_code_owner_reviews: true
      require_last_push_approval: true
    
    # Require status checks
    required_status_checks:
      strict: true
      checks:
        - "📋 Phase 1 - Lint & Validate"
        - "🧪 Phase 2 - Unit Tests (Layer 1)"
        - "🔗 Phase 3 - Integration Tests (Layer 2)"
        - "🎭 Phase 4 - E2E Tests (Layer 3)"
        - "🐳 Phase 5 - Test & Build Docker"
        - "🔒 Phase 6 - Security Scan (Layer 4)"
        - "📊 Phase 7 - CI Summary"
    
    # Additional protections
    enforce_admins: true
    allow_force_pushes: false
    allow_deletions: false
    required_linear_history: true
    
    # Restrict pushes
    restrictions:
      users: []
      teams: ["maintainers"]
      apps: []

staging:
  protection_rules:
    # Require pull request reviews (less strict)
    required_pull_request_reviews:
      required_approving_review_count: 1
      dismiss_stale_reviews: true
      require_code_owner_reviews: false
    
    # Basic status checks
    required_status_checks:
      strict: false
      checks: []
    
    # Allow force pushes for staging
    allow_force_pushes: true
    allow_deletions: false