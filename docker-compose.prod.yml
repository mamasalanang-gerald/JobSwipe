services:
  # ==========================================
  # DATABASE SERVICES
  # ==========================================
  
  postgres:
    image: postgres:15-alpine
    container_name: jobapp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-jobapp}
      POSTGRES_USER: ${DB_USERNAME:-jobapp}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-jobapp}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jobapp_network

  mongodb:
    image: mongo:7
    container_name: jobapp_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-jobapp}
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jobapp_network

  redis:
    image: redis:7-alpine
    container_name: jobapp_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jobapp_network

  # ==========================================
  # APPLICATION SERVICES
  # ==========================================

  backend:
    image: ${BACKEND_IMAGE:-gm1026/jobapp-backend}:${BACKEND_TAG:-latest}
    container_name: jobapp_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_NAME: ${APP_NAME:-JobSwipe}
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-https://jobswipe.site}
      
      # Database - PostgreSQL
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-jobapp}
      DB_USERNAME: ${DB_USERNAME:-jobapp}
      DB_PASSWORD: ${DB_PASSWORD}
      
      # Database - MongoDB
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      MONGO_DATABASE: ${MONGO_DATABASE:-jobapp}
      MONGO_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-root}
      MONGO_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      
      # Cache - Redis
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_PORT: 6379
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      
      # Queue
      HORIZON_PREFIX: ${HORIZON_PREFIX:-horizon:}
      
      # Mail
      MAIL_MAILER: ${MAIL_MAILER:-smtp}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_ENCRYPTION: ${MAIL_ENCRYPTION:-tls}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-JobSwipe}
      
      # AWS S3
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-ap-southeast-1}
      AWS_BUCKET: ${AWS_BUCKET}
      AWS_USE_PATH_STYLE_ENDPOINT: false
      
      # Stripe
      STRIPE_KEY: ${STRIPE_KEY}
      STRIPE_SECRET: ${STRIPE_SECRET}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      
      # OAuth
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
      
      # JWT
      JWT_SECRET: ${JWT_SECRET}
      JWT_TTL: ${JWT_TTL:-60}
      
      # Frontend URL
      FRONTEND_URL: ${FRONTEND_URL:-https://jobswipe.site}
      
      # Sanctum
      SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS:-jobswipe.site}
      SESSION_DOMAIN: ${SESSION_DOMAIN:-.jobswipe.site}
    volumes:
      - backend_storage:/var/www/html/storage
      - backend_logs:/var/www/html/storage/logs
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - jobapp_network

  horizon:
    image: ${BACKEND_IMAGE:-gm1026/jobapp-backend}:${BACKEND_TAG:-latest}
    container_name: jobapp_horizon
    restart: unless-stopped
    command: php artisan horizon
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    environment:
      APP_NAME: ${APP_NAME:-JobSwipe}
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      APP_DEBUG: false
      
      # Database - PostgreSQL
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-jobapp}
      DB_USERNAME: ${DB_USERNAME:-jobapp}
      DB_PASSWORD: ${DB_PASSWORD}
      
      # Database - MongoDB
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      MONGO_DATABASE: ${MONGO_DATABASE:-jobapp}
      MONGO_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-root}
      MONGO_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      
      # Cache - Redis
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_PORT: 6379
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      
      # Queue
      HORIZON_PREFIX: ${HORIZON_PREFIX:-horizon:}
      
      # Mail
      MAIL_MAILER: ${MAIL_MAILER:-smtp}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_ENCRYPTION: ${MAIL_ENCRYPTION:-tls}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-JobSwipe}
      
      # AWS S3
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-ap-southeast-1}
      AWS_BUCKET: ${AWS_BUCKET}
      
      # Stripe
      STRIPE_KEY: ${STRIPE_KEY}
      STRIPE_SECRET: ${STRIPE_SECRET}
      
      # JWT
      JWT_SECRET: ${JWT_SECRET}
    volumes:
      - backend_storage:/var/www/html/storage
      - backend_logs:/var/www/html/storage/logs
    networks:
      - jobapp_network

  frontend:
    image: ${FRONTEND_IMAGE:-gm1026/jobapp-web}:${FRONTEND_TAG:-latest}
    container_name: jobapp_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.jobswipe.site}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://jobswipe.site}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - jobapp_network

# ==========================================
# VOLUMES (Data Persistence)
# ==========================================
volumes:
  postgres_data:
    driver: local
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  redis_data:
    driver: local
  backend_storage:
    driver: local
  backend_logs:
    driver: local

# ==========================================
# NETWORKS
# ==========================================
networks:
  jobapp_network:
    driver: bridge
