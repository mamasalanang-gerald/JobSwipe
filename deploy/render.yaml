services:
  # Laravel Backend API
  - type: web
    name: jobapp-backend
    env: docker
    dockerCommand: /start.sh
    image:
      url: docker.io/gm1026/jobapp-backend:latest
    plan: starter
    region: oregon
    healthCheckPath: /api/health
    envVars:
      # App Configuration
      - key: APP_NAME
        value: JobApp
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        fromService:
          type: web
          name: jobapp-backend
          property: host
      - key: JWT_SECRET
        generateValue: true
      - key: APP_KEY
        generateValue: true
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: error
      
      # PostgreSQL Database
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: jobapp-postgres
          property: host
      - key: DB_PORT
        fromDatabase:
          name: jobapp-postgres
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: jobapp-postgres
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: jobapp-postgres
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: jobapp-postgres
          property: password
      
      # Redis Cache
      - key: REDIS_HOST
        fromDatabase:
          name: jobapp-redis
          property: host
      - key: REDIS_PORT
        fromDatabase:
          name: jobapp-redis
          property: port
      - key: REDIS_PASSWORD
        fromDatabase:
          name: jobapp-redis
          property: password
      - key: CACHE_DRIVER
        value: redis
      - key: SESSION_DRIVER
        value: redis
      - key: QUEUE_CONNECTION
        value: redis
      
      # MongoDB (External - Add these manually in Render dashboard)
      - key: MONGO_HOST
        value: your-mongodb-atlas-host
      - key: MONGO_PORT
        value: "27017"
      - key: MONGO_DATABASE
        value: jobapp
      - key: MONGO_USERNAME
        value: your-mongo-username
      - key: MONGO_PASSWORD
        value: your-mongo-password

  # Laravel Horizon Worker (Background Jobs)
  - type: worker
    name: jobapp-horizon
    env: docker
    image:
      url: docker.io/gm1026/jobapp-backend:latest
    plan: starter
    region: oregon
    envVars:
      # Flag to run Horizon instead of web server
      - key: RUN_HORIZON
        value: "true"
      
      # App Configuration
      - key: APP_NAME
        value: JobApp
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        fromService:
          type: web
          name: jobapp-backend
          property: host
      - key: JWT_SECRET
        sync: false
      - key: APP_KEY
        sync: false
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: error
      
      # PostgreSQL Database
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: jobapp-postgres
          property: host
      - key: DB_PORT
        fromDatabase:
          name: jobapp-postgres
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: jobapp-postgres
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: jobapp-postgres
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: jobapp-postgres
          property: password
      
      # Redis Cache
      - key: REDIS_HOST
        fromDatabase:
          name: jobapp-redis
          property: host
      - key: REDIS_PORT
        fromDatabase:
          name: jobapp-redis
          property: port
      - key: REDIS_PASSWORD
        fromDatabase:
          name: jobapp-redis
          property: password
      - key: CACHE_DRIVER
        value: redis
      - key: SESSION_DRIVER
        value: redis
      - key: QUEUE_CONNECTION
        value: redis
      
      # MongoDB (External - Add these manually in Render dashboard)
      - key: MONGO_HOST
        value: your-mongodb-atlas-host
      - key: MONGO_PORT
        value: "27017"
      - key: MONGO_DATABASE
        value: jobapp
      - key: MONGO_USERNAME
        value: your-mongo-username
      - key: MONGO_PASSWORD
        value: your-mongo-password

  # Next.js Web Frontend
  - type: web
    name: jobapp-web
    env: docker
    image:
      url: docker.io/gm1026/jobapp-web:latest
    plan: starter
    region: oregon
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: jobapp-backend
          property: host
      - key: NEXT_PUBLIC_API_VERSION
        value: v1
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"

databases:
  # PostgreSQL Database
  - name: jobapp-postgres
    plan: starter
    region: oregon
    
  # Redis Cache
  - name: jobapp-redis
    plan: starter
    region: oregon