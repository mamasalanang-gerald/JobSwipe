version: '3.8'

services:
  # PostgreSQL - Relational Database
  postgres:
    image: postgres:15-alpine
    container_name: jobapp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - jobapp_network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME}']
      interval: 10s
      timeout: 5s
      retries: 5

  # MongoDB - NoSQL Database
  mongodb:
    image: mongo:7
    container_name: jobapp_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE}
    volumes:
      - mongodb_data:/data/db
    networks:
      - jobapp_network
    healthcheck:
      test: ['CMD-SHELL', 'mongosh --eval "db.adminCommand({ ping: 1 })"']
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis - Cache & Session Store
  redis:
    image: redis:7-alpine
    container_name: jobapp_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - jobapp_network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    image: gm1026/jobapp-backend:latest
    container_name: jobapp_backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      APP_NAME: JobApp
      APP_ENV: production
      APP_DEBUG: false
      APP_URL: ${APP_URL}
      APP_KEY: ${APP_KEY}
      JWT_SECRET: ${JWT_SECRET}
      LOG_CHANNEL: stderr
      LOG_LEVEL: info
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      MONGO_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_DATABASE: ${MONGO_DATABASE}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_PORT: 6379
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      MAIL_MAILER: ${MAIL_MAILER}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_ENCRYPTION: tls
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS}
      MAIL_FROM_NAME: JobApp
    networks:
      - jobapp_network
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Horizon Worker
  horizon:
    image: gm1026/jobapp-backend:latest
    container_name: jobapp_horizon
    restart: unless-stopped
    environment:
      RUN_HORIZON: "true"
      APP_NAME: JobApp
      APP_ENV: production
      APP_DEBUG: false
      APP_URL: ${APP_URL}
      APP_KEY: ${APP_KEY}
      JWT_SECRET: ${JWT_SECRET}
      LOG_CHANNEL: stderr
      LOG_LEVEL: info
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      MONGO_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_DATABASE: ${MONGO_DATABASE}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_PORT: 6379
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      MAIL_MAILER: ${MAIL_MAILER}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_ENCRYPTION: tls
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS}
      MAIL_FROM_NAME: JobApp
    networks:
      - jobapp_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Reverb WebSocket Server
  reverb:
    image: gm1026/jobapp-backend:latest
    container_name: jobapp_reverb
    restart: unless-stopped
    ports:
      - "8090:8090"
    environment:
      RUN_REVERB: "true"
      APP_NAME: JobApp
      APP_ENV: production
      APP_DEBUG: false
      APP_URL: ${APP_URL}
      APP_KEY: ${APP_KEY}
      JWT_SECRET: ${JWT_SECRET}
      LOG_CHANNEL: stderr
      LOG_LEVEL: info
      REVERB_HOST: 0.0.0.0
      REVERB_PORT: 8090
      REVERB_SERVER_HOST: ${REVERB_SERVER_HOST:-ws.yourdomain.com}
      REVERB_SERVER_PORT: ${REVERB_SERVER_PORT:-443}
      REVERB_SCHEME: ${REVERB_SCHEME:-https}
      REVERB_APP_ID: ${REVERB_APP_ID}
      REVERB_APP_KEY: ${REVERB_APP_KEY}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_PORT: 6379
      CACHE_DRIVER: redis
    networks:
      - jobapp_network
    depends_on:
      redis:
        condition: service_healthy

  # Frontend Web
  frontend:
    image: gm1026/jobapp-web:latest
    container_name: jobapp_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_API_VERSION: v1
      NEXT_TELEMETRY_DISABLED: "1"
    networks:
      - jobapp_network

networks:
  jobapp_network:
    external: true

volumes:
  postgres_data:
    driver: local
  mongodb_data:
    driver: local
  redis_data:
    driver: local
